<!DOCTYPE html>
<!-- marcacao de doctype define a versao do html que é o 5 -->
<html lan ="pt-br">
    <!-- MARCACAO DE HTML É A RAIZ DO MODELO DE OBJETO DE DOCUMENTO -->
    <!-- so tem uma e tem 2 tag´s dentro: head e body(NESSA E SOMENTE NESSA ORDEM)-->
    <!-- dentro da marcacao html existe o atributo lang
     ele é assim: lang="{valor}"
     ex: lang="pt-br" - protugues brasileiro
         lang="fr" - frances-->
    <head>
        <!-- marcacao head: recebe configuracoes da pagina
         - nome do desenvolvendor
         - palavras-chave
         - descricao do site 
         - tabulacao dos acentos 
          -->
        <title>Titulos</title>
        <!-- aparece no titulo da aba -->
        <meta name="utf-8">
        <!--  meta de utf-8 regula a acentuacao -->
        <meta name="keywords" content="ifrn, cnat, diatinf, infoweb">
        <!-- meta de keywords/ palavras-chave ajuda na indexaçao dos robos de busca -->
        <!-- essa tag tem 2 atributos -->
         <meta name="author" content="Seu nome">
         <meta name="description" content="Essa é a descricao do meu primeiro site.">
         <!-- o valor 'descripition' é a descricao que aparece no site -->
    </head>
    <body>
        <!-- todas as marcacoes e seus conteudos ficaro visiveis -->
        <h1>IFRN</h1>
        <h2>Cursos</h2>
            <h3>Informatica para internet</h3> 
                <p>O curso de Informatica para internet é importante para ...</p>
            <h3>Controle Ambiental</h3>
                <p>O curso de controle ambiental é importante para ...</p>
        <h2>Campi</h2>
            <h3>Campus Natal Central</h3>
                <p>O campus ...</p>
        <hr>
        <!-- hr = horizontal row/ linha horizontal
         SEMANTICA: separa blocos de informacoes por assunto.
          -->
    </body>
</html>

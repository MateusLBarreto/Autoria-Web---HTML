    <h1>EMPREENDA CNAT</h1>
        <img src="R.png" alt="Marca da ITNC">
        <!-- 
        IMG: 
        - permite incluir imagens  no html
        - é uma imagem conteudista(diferente da imagem decorativa)
            -contem uma informacao 
        - pode ser .png,.jpeg,.jpg,.gif ... 
        -a marcacao de imagem pode ficar dentro da marcacao de h1, figure, etc.
        -->
    <figure>
        <img src="Empreenda_2026.width-800.png" alt="Empreenda CNAT">
        <!--
        FIGURE: é uma marcacao NOVA que representa um bloco de para imagem
        - pode ter uma imagem ou varias;
        - pode ter figcaption - que é uma marcacao de legenda
        scr: source - é a fonte da imagem e precisade um link externo ao arquivo html
        alt: alternative - é um conteudo alternativo usado para aqueles que nao conseguem ver a imagem 
        -->
    </figure>

<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="author", content="Mateus lemos Barreto">
    <style>
        div#container{
            border: 2px solid black;
            max-width: 70rem; /*precisa definir a largura para deixar o container no centro*/
            margin: 0 auto; /*coloca o container no centro*/
        }
        div div{ 
            /*
            para esta formatacao ficar apenas nas marcacoes filhas, é necessario colocar no seletor do css a marcacao anterior
            */
            border:1px solid black;
            width: 20rem;
            margin: 2rem;
            padding: 2rem;

        }
        /* 
        o atributo de 'order' altera a ordem dos elementoos do container que tem display: flex.
        */
        div.a{ order: 3;}
        div.b{ order: 5;}
        div.c{ order: 2;}
        div.d{ order: 4;}
        div.e{ order: 1;}
    </style>
    <title>DISPLAY FLEX - com container</title>
</head>
<body>
    <div id="container">
        <div class="a"><p>1</p></div>
        <div class="b"><p>2</p></div>
        <div class="c"><p>3</p></div>
        <div class="d"><p>4</p></div>
        <div class="e"><p>5</p></div>
    </div>
   
    <!-- tantos div asssim nao sao recomendados, pois nao tem valor semantico -->
</body>
</html>
